<section>
 <div class="contact-container">
  <label for="fname">First Name: </label>
  <input type="text" id="fname" name="firstname" required placeholder="Required">
  <label for="lname">Last Name: </label>
  <input type="text" id="lname" name="lastname" required placeholder="Required">
  <label for="email">Email: </label>
  <input type="email" id="email" name="email" required placeholder="example@example.com">
  <label for="phone">Phone Number: </label>
  <input type="tel" id="phone" name="phone" required placeholder="123-456-7890">
  <label for="message">WHy do you want to join Nameless Hands: </label>
  <textarea id="message" rows="5" cols="25" name="message" placeholder="Type answer here"></textarea>
  <button type="submit">Send</button>
 </form>
